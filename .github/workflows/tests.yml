# ============================================
# CI Pipeline - Tests & Linting
# ============================================
name: Tests & Quality Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.9'

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy
          pip install -r requirements.txt

      - name: Run flake8
        run: flake8 dags/ lambdas/ scripts/ tests/ --max-line-length=120 --statistics

      - name: Check formatting (black)
        run: black --check dags/ lambdas/ scripts/ tests/

      - name: Check import sorting (isort)
        run: isort --check-only dags/ lambdas/ scripts/ tests/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          SNOWFLAKE_ACCOUNT: test_account
          SNOWFLAKE_USER: test_user
          SNOWFLAKE_PASSWORD: test_password
          SNOWFLAKE_DATABASE: TEST_DB
          SNOWFLAKE_WAREHOUSE: TEST_WH
          PIPELINE_ENV: test
        run: |
          pytest tests/ -v --tb=short --cov=dags --cov=lambdas --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker-compose config --quiet

      - name: Build containers
        run: docker-compose build --no-cache
