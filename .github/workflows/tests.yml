# ============================================
# CI Pipeline - Tests & Linting
# ============================================
name: Tests & Quality Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: |
          flake8 dags/ lambdas/ scripts/ tests/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503,E402,F401,E722 \
            --exclude=__pycache__,*.pyc,.git \
            --statistics \
            --count

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pytest pytest-mock pytest-cov faker

      - name: Run tests with coverage
        env:
          SNOWFLAKE_ACCOUNT: test_account
          SNOWFLAKE_USER: test_user
          SNOWFLAKE_PASSWORD: test_password
          SNOWFLAKE_DATABASE: TEST_DB
          SNOWFLAKE_WAREHOUSE: TEST_WH
          PIPELINE_ENV: test
        run: |
          pytest tests/ -v --tb=short --cov=dags --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker-validate:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose syntax
        run: docker compose config --quiet
